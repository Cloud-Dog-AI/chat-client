services:
  chat-client:
    build:
      context: .
      dockerfile: Dockerfile.chat-client
    image: cloud-dog-chat-client:latest
    container_name: chat-client
    env_file:
      - ${CHAT_CLIENT_CONFIG_PATH:-./docker/chat-client.env}
    ports:
      - "${CHAT_CLIENT_API_PORT:-8090}:8090"
    volumes:
      - ${CHAT_CLIENT_LOGS_DIR:-./docker/runtime/chat-client/logs}:/app/logs
      - ${CHAT_CLIENT_CONFIG_PATH:-./docker/chat-client.env}:/app/env:ro
    depends_on:
      sql-agent-mcp:
        condition: service_started
      file-mcp:
        condition: service_started
    networks:
      - chat-mcp-net
    restart: unless-stopped

  sql-agent-api:
    build:
      context: ../sql-agent-mcp-server
      dockerfile: Dockerfile
    image: sql-agent-mcp-server:latest
    container_name: sql-agent-api
    command: ["api"]
    environment:
      - CLOUD_DOG__API_SERVER__HOST=0.0.0.0
      - CLOUD_DOG__API_SERVER__PORT=8083
      - CLOUD_DOG__APP__CACHEFOLDER=/app/cache
      - CLOUD_DOG__DB__URI=${SQL_AGENT_DB_URI:-sqlite:////app/database/sql-agent.db}
      - CLOUD_DOG__LLM__PROVIDER=${SQL_AGENT_LLM_PROVIDER:-ollama}
      - CLOUD_DOG__LLM__BASE_URL=${SQL_AGENT_LLM_BASE_URL:-http://host.docker.internal:11434}
      - CLOUD_DOG__LLM__MODEL=${SQL_AGENT_LLM_MODEL:-qwen3:14b}
      - CLOUD_DOG__API_SERVER__API_KEY=${SQL_AGENT_API_KEY:-}
    volumes:
      - ${SQL_AGENT_CACHE_DIR:-./docker/runtime/sql-agent/cache}:/app/cache
      - ${SQL_AGENT_DATABASE_DIR:-./docker/runtime/sql-agent/database}:/app/database
      - ${SQL_AGENT_LOGS_DIR:-./docker/runtime/sql-agent/logs}:/app/logs
      - ${SQL_AGENT_CERTS_DIR:-./docker/runtime/sql-agent/certificates}:/app/certificates
      - ${SQL_AGENT_QUERY_RESPONSES_DIR:-./docker/runtime/sql-agent/query_responses}:/app/query_responses
    networks:
      - chat-mcp-net
    restart: unless-stopped

  sql-agent-mcp:
    image: sql-agent-mcp-server:latest
    container_name: sql-agent-mcp
    command: ["mcp"]
    environment:
      - CLOUD_DOG__MCP_SERVER__ENABLED=true
      - CLOUD_DOG__MCP_SERVER__HOST=0.0.0.0
      - CLOUD_DOG__MCP_SERVER__PORT=8081
      - CLOUD_DOG__MCP_SERVER__API_BASE_URL=http://sql-agent-api:8083
      - CLOUD_DOG__MCP_SERVER__API_KEY=${SQL_AGENT_API_KEY:-}
    volumes:
      - ${SQL_AGENT_LOGS_DIR:-./docker/runtime/sql-agent/logs}:/app/logs
      - ${SQL_AGENT_CERTS_DIR:-./docker/runtime/sql-agent/certificates}:/app/certificates
    depends_on:
      sql-agent-api:
        condition: service_started
    networks:
      - chat-mcp-net
    restart: unless-stopped

  file-mcp:
    build:
      context: ../file-mcp-server
      dockerfile: Dockerfile
    image: file-mcp-server:latest
    container_name: file-mcp
    environment:
      - FILE_MCP_HTTP_HOST=0.0.0.0
      - FILE_MCP_HTTP_PORT=8000
      - FILE_MCP_ENV_PATH=/workspace/env.base
      - FILE_MCP_API_KEY_PRIMARY=${FILE_MCP_API_KEY_PRIMARY:-change-me}
      - FILE_MCP_AUTH_HEADER_NAME=Authorization
      - FILE_MCP_AUTH_HEADER_SCHEME=Bearer
      - FILE_MCP_PROFILE=${FILE_MCP_PROFILE:-local}
      - FILE_MCP_STORAGE_BACKEND=${FILE_MCP_STORAGE_BACKEND:-local}
      - FILE_MCP_ROOT_PATH=${FILE_MCP_ROOT_PATH:-/workspace}
    volumes:
      - ${FILE_MCP_WORKSPACE_DIR:-./docker/runtime/file-mcp/workspace}:/workspace
      - ${FILE_MCP_LOGS_DIR:-./docker/runtime/file-mcp/logs}:/workspace/logs
      - ${FILE_MCP_ENV_FILE_PATH:-./docker/file-mcp.env.example}:/workspace/env.base:ro
    networks:
      - chat-mcp-net
    restart: unless-stopped

networks:
  chat-mcp-net:
    driver: bridge
